<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Login | UMAMTEK</title>

<link rel="stylesheet" href="./css/style.css?v=100">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div class="logo-area">
<a href="index.html">
<img src="logo.png" class="site-logo" alt="UMAMTEK Logo">
</a>
</div>

<section class="section">

<h1 class="section-title">Staff Login</h1>

<div class="card" style="max-width:500px;margin:auto;">

<input type="text" id="staffName" placeholder="Enter Staff Name">

<input type="text" id="staffPhone" placeholder="Enter Staff Mobile Number">

<button onclick="staffLogin()">
Login to Staff Panel
</button>

</div>

</section>

<footer class="premium-footer">
<h2>UMAMTEK</h2>
<p>Your Project Our Priority</p>
</footer>

<script>

function staffLogin(){

  const name = document.getElementById("staffName").value.trim();
  const phone = document.getElementById("staffPhone").value.replace(/\D/g, "");

  if(!name || !phone){
    alert("Please enter staff name and phone");
    return;
  }

  if(phone.length !== 10){
    alert("Please enter valid 10 digit mobile number");
    return;
  }

  localStorage.setItem("umamtekStaffLoggedIn", "true");
  localStorage.setItem("umamtekStaffName", name);
  localStorage.setItem("umamtekStaffPhone", phone);

  alert("Staff login successful");
  window.location.href = "staff.html";

}

</script>

</body>
</html>
