<h1 class="section-title">
Create UMAMTEK Account
</h1>

<div class="card" style="max-width:500px;margin:auto;">

<form>

<input type="text" id="signupName" placeholder="Full Name">

<input type="tel" id="signupPhone" placeholder="Mobile Number">

<select id="signupRole">
<option value="">Select Account Type</option>
<option value="customer">Customer</option>
<option value="partner">Partner Worker</option>
</select>

<input type="password" id="signupPassword" placeholder="Create Password">

<div
id="recaptcha-container"
style="margin:20px 0;display:flex;justify-content:center;">
</div>
<button type="button" onclick="sendSignupOTPForPasswordAccount()">
Send OTP
</button>

<input type="text" id="signupOtp" placeholder="Enter OTP">

<button type="button" onclick="createPhonePasswordAccount()">
Create Account
</button>

</form>

<br>

Already have an account?

</p>
