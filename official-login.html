<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Login | UMAMTEK</title>

<link rel="stylesheet" href="./css/style.css?v=130">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<nav class="navbar">

<div class="logo-area">
  <a href="index.html">
    <img src="logo.png" class="site-logo" alt="UMAMTEK Logo">
  </a>
</div>

<section class="section">

<h1 class="section-title">Official Login</h1>

<div class="card" style="max-width:500px;margin:auto;">

<input type="text" id="officialName" placeholder="Enter Official Name">

<input type="text" id="officialPhone" placeholder="Enter Official Mobile Number">

<input type="password" id="officialCode" placeholder="Enter Official Access Code">

<button onclick="officialLogin()">
Login to Official Panel
</button>

</div>

</section>

<footer class="premium-footer">
<h2>UMAMTEK</h2>
<p>Your Project Our Priority</p>
</footer>

<script>

function officialLogin(){

  const name = document.getElementById("officialName").value.trim();
  const phone = document.getElementById("officialPhone").value.replace(/\D/g, "");
  const code = document.getElementById("officialCode").value.trim();

  if(!name || !phone || !code){
    alert("Please fill all official login details");
    return;
  }

  if(phone.length !== 10){
    alert("Please enter valid 10 digit mobile number");
    return;
  }

  if(code !== "UMAMTEK2026"){
    alert("Invalid official access code");
    return;
  }

  localStorage.setItem("umamtekOfficialLoggedIn", "true");
  localStorage.setItem("umamtekOfficialName", name);
  localStorage.setItem("umamtekOfficialPhone", phone);

  alert("Official login successful");
  window.location.href = "official.html";

}

</script>

</body>
</html>
