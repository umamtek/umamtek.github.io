<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Staff Registry | UMAMTEK</title>

<link rel="stylesheet" href="./css/style.css?v=170">
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<script>
if(localStorage.getItem("umamtekAdminLoggedIn") !== "true"){
  window.location.href = "admin-login.html";
}
</script>

<nav class="navbar">

<div class="logo-area">
<a href="index.html">
<img src="logo.png" class="site-logo" alt="UMAMTEK Logo">
</a>
</div>

<div class="nav-actions">
<button class="dark-btn" onclick="toggleDarkMode()">🌙</button>
<a href="admin.html" class="primary-btn">Admin</a>
</div>

</nav>

<section class="section">

<h1 class="section-title">Staff Registry</h1>

<p class="section-subtitle">
Add electricians, plumbers, AC technicians and other partners here.
</p>

<div class="card" style="max-width:650px;margin:auto;">

<form onsubmit="addStaffMember(event)">

<input type="text" id="staffRegName" placeholder="Staff Name" required>

<input type="tel" id="staffRegPhone" placeholder="Mobile Number" required>

<select id="staffRegSkill" required>
<option value="">Select Skill</option>
<option>Electrician</option>
<option>Plumber</option>
<option>AC Technician</option>
<option>CCTV Technician</option>
<option>Painter</option>
<option>Carpenter</option>
<option>Other</option>
</select>

<input type="text" id="staffRegArea" placeholder="Working Area / Locality" required>

<select id="staffRegStatus" required>
<option value="Active">Active</option>
<option value="Offline">Offline</option>
<option value="Busy">Busy</option>
</select>

<button type="submit">Add Staff</button>

</form>

</div>

<br>

<h2>Registered Staff</h2>

<div id="staffRegistryContainer" class="card-grid">
<div class="card">Loading staff...</div>
</div>

</section>

<footer class="premium-footer">
<h2>UMAMTEK</h2>
<p>Your Project Our Priority</p>
</footer>

<script src="js/script.js"></script>
<script type="module" src="js/firebase.js"></script>

<script>
setTimeout(() => {
  if(window.loadStaffRegistry){
    window.loadStaffRegistry();
  }
}, 1200);
</script>

</body>
</html>
