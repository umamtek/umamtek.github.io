<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Review Service | UMAMTEK</title>

<link rel="stylesheet" href="./css/style.css?v=160">
<link rel="icon" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
.rating-box{
display:grid;
gap:15px;
}

.rating-row{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
padding:12px;
border-radius:14px;
background:rgba(245,179,1,0.10);
}

.rating-row select{
max-width:150px;
}

.review-note{
font-size:14px;
font-weight:700;
color:#f5b301;
margin-bottom:15px;
}
</style>

</head>

<body>

<nav class="navbar">

<div class="logo-area">
<a href="index.html">
<img src="logo.png" class="site-logo" alt="UMAMTEK Logo">
</a>
</div>

<div class="nav-actions">
<button class="dark-btn" onclick="toggleDarkMode()">🌙</button>
</div>

</nav>

<section class="section">

<h1 class="section-title">Rate Your Service</h1>

<p class="section-subtitle">
Your feedback helps UMAMTEK improve service quality.
</p>

<div class="card" style="max-width:650px;margin:auto;">

<p class="review-note">
Please submit review only after service completion.
</p>

<form onsubmit="submitReview(event)" class="rating-box">

<input type="text" id="reviewBookingId" placeholder="Booking ID e.g. AEA1234" required>

<div class="rating-row">
<label>Work Quality</label>
<select id="workQuality" required>
<option value="">Select</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
</div>

<div class="rating-row">
<label>Timing</label>
<select id="timingRating" required>
<option value="">Select</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
</div>

<div class="rating-row">
<label>Behaviour</label>
<select id="behaviourRating" required>
<option value="">Select</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
</div>

<div class="rating-row">
<label>Overall Experience</label>
<select id="overallRating" required>
<option value="">Select</option>
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Good</option>
<option value="3">⭐⭐⭐ Average</option>
<option value="2">⭐⭐ Poor</option>
<option value="1">⭐ Very Poor</option>
</select>
</div>

<textarea id="reviewComment" placeholder="Write your experience..." required></textarea>

<button type="submit">
Submit Review
</button>

</form>

</div>

</section>

<footer class="premium-footer">
<h2>UMAMTEK</h2>
<p>Your Project Our Priority</p>
</footer>

<script src="js/script.js"></script>
<script type="module" src="js/firebase.js"></script>

</body>
</html>
